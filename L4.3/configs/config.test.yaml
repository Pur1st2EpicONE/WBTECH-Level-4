# Docker environment flag
docker: true                                          # Indicates containerized run; getenv errors are suppressed (envs come from docker-compose)

# Logger configuration
logger:
  log_directory: ./logs                               # Directory where logs will be stored; if empty, logs are written to stdout
  debug_mode: true                                    # Enable debug-level logging

# HTTP server configuration
server:
  port: "8080"                                        # Port where the HTTP server listens; must match the exposed port in docker-compose.full.yaml
  read_timeout: 5s                                    # Maximum duration for reading the entire request
  write_timeout: 10s                                  # Maximum duration before timing out response writes
  max_header_bytes: 1048576                           # Maximum size of request headers in bytes
  shutdown_timeout: 10s                               # Timeout for graceful server shutdown

# Business logic service configuration
service:
  auth:
    token_ttl: 30m                                    # Lifetime of JWT tokens (e.g., 30m, 2h, 24h)
    min_login_length: 3                               # Minimum allowed length for user login/username
    max_login_length: 50                              # Maximum allowed length for user login/username
    min_password_length: 5                            # Minimum allowed length for user password
  core:
    min_item_name_length: 2                           # Minimum length of an item name
    max_item_name_length: 150                         # Maximum length of an item name
    max_item_description_length: 2000                 # Maximum length of an item description
    min_item_quantity: 1                              # Minimum allowed quantity in stock
    max_item_quantity: 100000                         # Maximum allowed quantity in stock
    max_item_price: 1000000                           # Maximum allowed item price (in cents or smallest currency unit)

# Database (PostgreSQL) configuration
database:
  goose_dialect: "postgres"                           # Dialect used by goose migrations
  goose_migrations_directory: "./migrations"          # Directory containing migration files
  host: postgres-test                                 # Database host
  port: "5432"                                        # Database port; must match the exposed port in docker-compose.full.yaml
  dbname: atlas_test                                  # Database name
  sslmode: disable                                    # SSL mode for database connection
  max_open_conns: 20                                  # Maximum number of open database connections
  max_idle_conns: 10                                  # Maximum number of idle connections
  conn_max_lifetime: 30m                              # Maximum lifetime of a database connection
  query_retry_strategy:
    attempts: 1                                       # Number of retry attempts for failed DB queries
    delay: 200ms                                      # Initial delay between retries
    backoff: 2                                        # Backoff multiplier for retry delay
  tx_retry_strategy:
    attempts: 1                                       # Number of retry attempts for failed DB queries in transaction
    delay: 200ms                                      # Initial delay between retries
    backoff: 2                                        # Backoff multiplier for retry delay
