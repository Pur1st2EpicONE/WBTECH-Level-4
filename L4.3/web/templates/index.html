<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Calendar</h1>
        <div class="controls">
          <button id="btn-today">Today</button>
          <button id="btn-prev">←</button>
          <span id="current-period" class="period"></span>
          <button id="btn-next">→</button>

          <select id="view-mode">
            <option value="day">Day</option>
            <option value="week" selected>Week</option>
            <option value="month">Month</option>
          </select>

          <button id="btn-new-event">+ New Event</button>
        </div>
      </header>

      <div class="main">
        <div id="calendar-view" class="calendar-view"></div>
        <div id="events-list" class="events-list"></div>
      </div>
    </div>

    <div id="event-modal" class="modal">
      <div class="modal-content">
        <h2 id="modal-title">New Event</h2>

        <form id="event-form">
          <input type="hidden" id="event-id" />

          <label>Date:</label>
          <input type="date" id="event-date" required />

          <label>Time (optional):</label>
          <input type="time" id="event-time" />

          <label>Reminder (minutes before event):</label>
          <input type="number" id="event-reminder" value="30" min="0" />

          <label>Event:</label>
          <textarea
            id="event-text"
            rows="4"
            placeholder="What do you need to do?"
            required
          ></textarea>

          <div class="modal-buttons">
            <button type="button" id="btn-cancel">Cancel</button>
            <button type="submit" id="btn-save">Save</button>
            <button
              type="button"
              id="btn-delete"
              class="delete-btn"
              style="display: none"
            >
              Delete
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
